name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write # mint OIDC tokens for Sigstore (artifact attestation)
  attestations: write # publish build-provenance attestations

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Obsidian/BRAT resolve release assets by the EXACT manifest version, so a
      # mismatched tag (classic: a stray v-prefix) would publish an uninstallable
      # release. Fail fast instead.
      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(jq -r .version manifest.json)"
          if [ "$tag" != "$version" ]; then
            echo "Tag '$tag' does not match manifest.json version '$version' (tags must have no v prefix)." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build
        run: |
          npm ci
          # Gate the release on the Obsidian API check (obsidianmd/no-unsupported-api):
          # fail before publishing if any code uses an API newer than minAppVersion.
          npm run lint
          npm run build

      # Cryptographically attest the built artifacts so users can verify they
      # were produced by this repo's CI from this source (gh attestation verify).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Extract changelog section
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $tag" > RELEASE_NOTES.md
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --notes-file RELEASE_NOTES.md \
            main.js manifest.json styles.css
